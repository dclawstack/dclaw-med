{{- if .Values.cloudnativepg.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cloudnativepg.name }}
  labels:
    {{- include "dclaw-med.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cloudnativepg.instances }}
  storage:
    size: {{ .Values.cloudnativepg.storage.size }}
  bootstrap:
    initdb:
      database: {{ .Values.cloudnativepg.database }}
      owner: {{ .Values.cloudnativepg.username }}
  monitoring:
    enabled: true
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dclaw-med.fullname" . }}-db-credentials
  labels:
    {{- include "dclaw-med.labels" . | nindent 4 }}
type: Opaque
stringData:
  uri: "postgresql://{{ .Values.cloudnativepg.username }}:{{ .Values.cloudnativepg.username }}@{{ .Values.cloudnativepg.name }}-rw:5432/{{ .Values.cloudnativepg.database }}"
{{- end }}

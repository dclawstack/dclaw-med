apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dclaw-med.fullname" . }}-backend
  labels:
    app: {{ include "dclaw-med.name" . }}-backend
    {{- include "dclaw-med.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dclaw-med.name" . }}-backend
      {{- include "dclaw-med.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "dclaw-med.name" . }}-backend
        {{- include "dclaw-med.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8092
              name: http
          env:
            - name: DATABASE_URL
{{- if .Values.cloudnativepg.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "dclaw-med.fullname" . }}-db-credentials
                  key: uri
{{- else }}
              value: "{{ .Values.backend.database_url }}"
{{- end }}
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8092"
            - name: APP_ENV
              value: "prod"
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dclaw-med.fullname" . }}-frontend
  labels:
    app: {{ include "dclaw-med.name" . }}-frontend
    {{- include "dclaw-med.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dclaw-med.name" . }}-frontend
      {{- include "dclaw-med.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "dclaw-med.name" . }}-frontend
        {{- include "dclaw-med.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://med.dclawstack.io"
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10

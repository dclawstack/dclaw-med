app_id: med
replicaCount: 1

image:
  backend:
    repository: ghcr.io/dclawstack/dclaw-med-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/dclawstack/dclaw-med-frontend
    tag: latest
    pullPolicy: IfNotPresent

service:
  backend:
    type: ClusterIP
    port: 8092
    targetPort: 8092
  frontend:
    type: ClusterIP
    port: 3004
    targetPort: 3004

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: med.dclawstack.io
      paths:
        - path: /api
          pathType: Prefix
          service: backend
          port: 8092
        - path: /
          pathType: Prefix
          service: frontend
          port: 3004
  tls:
    - secretName: med-dclawstack-io-tls
      hosts:
        - med.dclawstack.io

resources:
  backend:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"
  frontend:
    limits:
      memory: "256Mi"
      cpu: "250m"
    requests:
      memory: "128Mi"
      cpu: "100m"

cloudnativepg:
  enabled: false
  name: dclaw-med-db
  instances: 1
  storage:
    size: 10Gi
  database: dclaw_med
  username: app

serviceAccount:
  create: true
  annotations: {}
  name: ""
